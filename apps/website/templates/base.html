{% load static %}
<!--

"Love as a principle, order as a foundation, and progress as a goal"

                                                Auguste Comte
-->
<html>
    <head>
        <title>Martin</title>

        <link rel="stylesheet" href="{% static '/tom-select/tom-select.css' %}" />
        <link rel="stylesheet" href="{% static '/styles/style.css' %}" />
        <link rel="stylesheet" href="{% static '/styles/forms.css' %}" />
        <link rel="stylesheet" href="{% static '/styles/tabs.css' %}" />
        <link rel="stylesheet" href="{% static '/styles/tables.css' %}" />
        <link rel="stylesheet" href="{% static '/styles/banks.css' %}" />
        <link rel="stylesheet" href="{% static '/styles/suggestions.css' %}" />
        <link rel="stylesheet" href="{% static '/styles/layout.css' %}" />
        <link rel="stylesheet" href="{% static '/styles/text-styles.css' %}" />

        {% block stylesheets %}{% endblock %}

        <script src="{% static 'htmx-2.0.8.js' %}" type="module" defer></script>
        <script src="{% static 'tabs.js' %}" type="module" defer></script>
        <script src="{% static 'tom-select/tom-select.complete.js' %}" type="module" defer></script>
    </head>
    <body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' hx-boost="false">
        <div class="grid-content">
            <aside class="sidebar">
                {% include 'navigation.html' %}
            </aside>
            <main class="content">
                {% block content %}{% endblock %}
            </main>
        </div>
        <script>
            // Initialize Tom Select on EVERY .tom-select element. Per-element behaviour is opted into with
            // data attributes, so any page gets "pick or create" declaratively without its own script:
            //   data-create="true"          -> allow creating a new option by typing
            //   data-create-on-blur="true"  -> commit the typed value when the field loses focus
            //   data-placeholder="..."      -> placeholder text
            function initTomSelects (root) {
                (root || document).querySelectorAll('.tom-select').forEach(el => {
                    if (el.tomselect) return
                    new TomSelect(el, {
                        create: el.dataset.create === 'true',
                        createOnBlur: el.dataset.createOnBlur === 'true',
                        persist: false,
                        placeholder: el.dataset.placeholder || undefined,
                        maxOptions: null
                    })
                })
            }

            window.addEventListener('load', function () {
                initTomSelects(document)
            })

            document.addEventListener('htmx:load', function (evt) {
                initTomSelects(evt.detail.elt)
            })

            window.initTomSelects = initTomSelects
        </script>
    </body>
</html>
